name: ⚖️ Financial Model Bias & Fairness Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run bias testing every week on Sunday at 6 AM UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.14.0"
  PYTHON_VERSION: "3.11"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  credit-scoring-bias-testing:
    name: ⚖️ Credit Scoring Model Bias Testing
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 📚 Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas scikit-learn matplotlib seaborn
          pip install fairlearn aif360 shap lime
          pip install jupyter pytest

      - name: 📚 Install Node.js Dependencies
        run: pnpm install --frozen-lockfile

      - name: ⚖️ Create Credit Scoring Bias Test Suite
        run: |
          mkdir -p bias-testing
          cat > bias-testing/credit_scoring_bias_test.py << 'EOF'
          import numpy as np
          import pandas as pd
          from sklearn.ensemble import RandomForestClassifier
          from sklearn.model_selection import train_test_split
          from sklearn.metrics import accuracy_score, confusion_matrix
          import json
          import warnings
          warnings.filterwarnings('ignore')

          def generate_ethiopian_credit_data(n_samples=10000):
              """Generate synthetic Ethiopian credit data with potential bias"""
              np.random.seed(42)
              
              # Protected attributes (should not influence credit decisions)
              gender = np.random.choice(['Male', 'Female'], n_samples, p=[0.52, 0.48])
              region = np.random.choice([
                  'Addis Ababa', 'Oromia', 'Amhara', 'Tigray', 'SNNPR', 
                  'Somali', 'Afar', 'Gambela', 'Harari', 'Dire Dawa'
              ], n_samples, p=[0.25, 0.35, 0.20, 0.06, 0.08, 0.03, 0.01, 0.01, 0.005, 0.005])
              
              age = np.random.normal(32, 12, n_samples).clip(18, 70)
              ethnicity = np.random.choice([
                  'Oromo', 'Amhara', 'Tigray', 'Sidama', 'Gurage', 'Other'
              ], n_samples, p=[0.34, 0.27, 0.06, 0.04, 0.03, 0.26])
              
              # Legitimate credit factors
              income = np.random.lognormal(9, 0.8, n_samples).clip(2000, 100000)  # ETB per month
              employment_length = np.random.exponential(3, n_samples).clip(0, 15)  # years
              education_level = np.random.choice([
                  'Primary', 'Secondary', 'University', 'Postgraduate'
              ], n_samples, p=[0.40, 0.35, 0.20, 0.05])
              
              payment_history_score = np.random.beta(2, 1, n_samples) * 100
              debt_to_income = np.random.beta(2, 3, n_samples) * 0.8  # Max 80%
              
              # Mobile money usage (important in Ethiopian context)
              mobile_money_history = np.random.exponential(2, n_samples).clip(0, 10)  # years
              
              # Create bias in the data (this should be detected and corrected)
              # Historical bias: certain regions may have been underserved
              region_bias_factor = np.where(
                  np.isin(region, ['Addis Ababa', 'Dire Dawa']), 1.2, 
                  np.where(np.isin(region, ['Somali', 'Afar', 'Gambela']), 0.7, 1.0)
              )
              
              # Gender bias in historical data (should be removed)
              gender_bias_factor = np.where(gender == 'Male', 1.1, 0.95)
              
              # Calculate credit worthiness (0 = high risk, 1 = low risk)
              base_score = (
                  (np.log(income) / 12) * 0.3 +
                  (employment_length / 15) * 0.2 +
                  (payment_history_score / 100) * 0.25 +
                  ((1 - debt_to_income)) * 0.15 +
                  (mobile_money_history / 10) * 0.1
              )
              
              # Apply biased factors (this creates the bias we want to detect)
              biased_score = base_score * region_bias_factor * gender_bias_factor
              
              # Add noise and convert to binary
              credit_approved = (biased_score + np.random.normal(0, 0.1, n_samples)) > 0.6
              
              return pd.DataFrame({
                  'gender': gender,
                  'region': region,
                  'age': age,
                  'ethnicity': ethnicity,
                  'income': income,
                  'employment_length': employment_length,
                  'education_level': education_level,
                  'payment_history_score': payment_history_score,
                  'debt_to_income': debt_to_income,
                  'mobile_money_history': mobile_money_history,
                  'credit_approved': credit_approved.astype(int)
              })

          def test_demographic_parity(data, protected_attr, outcome):
              """Test for demographic parity across protected groups"""
              groups = data[protected_attr].unique()
              approval_rates = {}
              
              for group in groups:
                  group_data = data[data[protected_attr] == group]
                  approval_rate = group_data[outcome].mean()
                  approval_rates[group] = approval_rate
              
              max_rate = max(approval_rates.values())
              min_rate = min(approval_rates.values())
              parity_ratio = min_rate / max_rate if max_rate > 0 else 0
              
              return approval_rates, parity_ratio

          def test_equalized_odds(data, protected_attr, outcome, prediction):
              """Test for equalized odds (equal TPR and FPR across groups)"""
              groups = data[protected_attr].unique()
              metrics = {}
              
              for group in groups:
                  group_data = data[data[protected_attr] == group]
                  
                  # True Positive Rate
                  tp = len(group_data[(group_data[outcome] == 1) & (group_data[prediction] == 1)])
                  fn = len(group_data[(group_data[outcome] == 1) & (group_data[prediction] == 0)])
                  tpr = tp / (tp + fn) if (tp + fn) > 0 else 0
                  
                  # False Positive Rate
                  fp = len(group_data[(group_data[outcome] == 0) & (group_data[prediction] == 1)])
                  tn = len(group_data[(group_data[outcome] == 0) & (group_data[prediction] == 0)])
                  fpr = fp / (fp + tn) if (fp + tn) > 0 else 0
                  
                  metrics[group] = {'TPR': tpr, 'FPR': fpr}
              
              return metrics

          def main():
              print("🔍 Generating Ethiopian credit scoring test data...")
              data = generate_ethiopian_credit_data(10000)
              
              print(f"📊 Dataset shape: {data.shape}")
              print(f"📈 Overall approval rate: {data['credit_approved'].mean():.2%}")
              
              # Prepare features for ML model
              feature_columns = ['age', 'income', 'employment_length', 'payment_history_score', 
                               'debt_to_income', 'mobile_money_history']
              
              # Encode categorical variables
              education_encoded = pd.get_dummies(data['education_level'], prefix='edu')
              gender_encoded = pd.get_dummies(data['gender'], prefix='gender')
              region_encoded = pd.get_dummies(data['region'], prefix='region')
              
              # Features WITHOUT protected attributes (fair model)
              X_fair = data[feature_columns].join(education_encoded)
              
              # Features WITH protected attributes (potentially biased model)
              X_biased = X_fair.join(gender_encoded).join(region_encoded)
              
              y = data['credit_approved']
              
              # Split data
              X_fair_train, X_fair_test, y_train, y_test = train_test_split(
                  X_fair, y, test_size=0.3, random_state=42, stratify=y
              )
              X_biased_train, X_biased_test, _, _ = train_test_split(
                  X_biased, y, test_size=0.3, random_state=42, stratify=y
              )
              
              # Train models
              print("🤖 Training fair credit scoring model...")
              fair_model = RandomForestClassifier(n_estimators=100, random_state=42)
              fair_model.fit(X_fair_train, y_train)
              fair_predictions = fair_model.predict(X_fair_test)
              
              print("🤖 Training potentially biased model...")
              biased_model = RandomForestClassifier(n_estimators=100, random_state=42)
              biased_model.fit(X_biased_train, y_train)
              biased_predictions = biased_model.predict(X_biased_test)
              
              # Create test dataframe with predictions
              test_data = data.iloc[X_fair_test.index].copy()
              test_data['fair_prediction'] = fair_predictions
              test_data['biased_prediction'] = biased_predictions
              
              print("\n📊 BIAS TESTING RESULTS")
              print("=" * 50)
              
              # Test demographic parity by gender
              print("\n👥 GENDER DEMOGRAPHIC PARITY TEST")
              gender_rates_actual, gender_parity_actual = test_demographic_parity(
                  test_data, 'gender', 'credit_approved'
              )
              gender_rates_fair, gender_parity_fair = test_demographic_parity(
                  test_data, 'gender', 'fair_prediction'
              )
              gender_rates_biased, gender_parity_biased = test_demographic_parity(
                  test_data, 'gender', 'biased_prediction'
              )
              
              print(f"Actual approval rates by gender: {gender_rates_actual}")
              print(f"Fair model parity ratio: {gender_parity_fair:.3f}")
              print(f"Biased model parity ratio: {gender_parity_biased:.3f}")
              print(f"✅ Bias detection: {'PASS' if gender_parity_fair > gender_parity_biased else 'FAIL'}")
              
              # Test demographic parity by region
              print("\n🌍 REGIONAL DEMOGRAPHIC PARITY TEST")
              region_rates_fair, region_parity_fair = test_demographic_parity(
                  test_data, 'region', 'fair_prediction'
              )
              region_rates_biased, region_parity_biased = test_demographic_parity(
                  test_data, 'region', 'biased_prediction'
              )
              
              print(f"Fair model regional parity ratio: {region_parity_fair:.3f}")
              print(f"Biased model regional parity ratio: {region_parity_biased:.3f}")
              print(f"✅ Regional bias detection: {'PASS' if region_parity_fair > region_parity_biased else 'FAIL'}")
              
              # Test equalized odds
              print("\n⚖️ EQUALIZED ODDS TEST")
              fair_eqodds = test_equalized_odds(test_data, 'gender', 'credit_approved', 'fair_prediction')
              biased_eqodds = test_equalized_odds(test_data, 'gender', 'credit_approved', 'biased_prediction')
              
              print("Fair model equalized odds:")
              for group, metrics in fair_eqodds.items():
                  print(f"  {group}: TPR={metrics['TPR']:.3f}, FPR={metrics['FPR']:.3f}")
              
              print("Biased model equalized odds:")
              for group, metrics in biased_eqodds.items():
                  print(f"  {group}: TPR={metrics['TPR']:.3f}, FPR={metrics['FPR']:.3f}")
              
              # Model accuracy comparison
              fair_accuracy = accuracy_score(y_test, fair_predictions)
              biased_accuracy = accuracy_score(y_test, biased_predictions)
              
              print(f"\n📈 MODEL PERFORMANCE")
              print(f"Fair model accuracy: {fair_accuracy:.3f}")
              print(f"Biased model accuracy: {biased_accuracy:.3f}")
              print(f"✅ Performance maintained: {'PASS' if fair_accuracy >= biased_accuracy - 0.02 else 'FAIL'}")
              
              # Save results
              results = {
                  'timestamp': pd.Timestamp.now().isoformat(),
                  'dataset_size': len(data),
                  'gender_parity': {
                      'fair_model': gender_parity_fair,
                      'biased_model': gender_parity_biased,
                      'improvement': gender_parity_fair - gender_parity_biased
                  },
                  'regional_parity': {
                      'fair_model': region_parity_fair,
                      'biased_model': region_parity_biased,
                      'improvement': region_parity_fair - region_parity_biased
                  },
                  'model_accuracy': {
                      'fair_model': fair_accuracy,
                      'biased_model': biased_accuracy
                  },
                  'bias_tests_passed': {
                      'gender_parity': gender_parity_fair > gender_parity_biased,
                      'regional_parity': region_parity_fair > region_parity_biased,
                      'performance_maintained': fair_accuracy >= biased_accuracy - 0.02
                  }
              }
              
              with open('credit_scoring_bias_results.json', 'w') as f:
                  json.dump(results, f, indent=2)
              
              print(f"\n📁 Results saved to credit_scoring_bias_results.json")
              return results

          if __name__ == "__main__":
              main()
          EOF

      - name: ⚖️ Run Credit Scoring Bias Tests
        run: |
          cd bias-testing
          python credit_scoring_bias_test.py

      - name: 🎯 Payment Plan Recommendation Bias Testing
        run: |
          cat > bias-testing/payment_plan_bias_test.py << 'EOF'
          import numpy as np
          import pandas as pd
          import json

          def generate_payment_plan_data(n_samples=5000):
              """Generate synthetic data for payment plan recommendations"""
              np.random.seed(42)
              
              # User demographics
              gender = np.random.choice(['Male', 'Female'], n_samples, p=[0.52, 0.48])
              age = np.random.normal(30, 10, n_samples).clip(18, 65)
              region = np.random.choice([
                  'Urban', 'Semi-Urban', 'Rural'
              ], n_samples, p=[0.35, 0.35, 0.30])
              
              # Financial characteristics
              monthly_income = np.random.lognormal(8.5, 0.7, n_samples).clip(3000, 50000)
              credit_score = np.random.beta(2, 1, n_samples) * 850 + 300  # 300-850 range
              existing_debt = monthly_income * np.random.beta(1, 3, n_samples) * 0.4
              
              # Purchase context
              purchase_amount = np.random.lognormal(8, 1, n_samples).clip(500, 50000)
              product_category = np.random.choice([
                  'Electronics', 'Fashion', 'Home', 'Education', 'Healthcare'
              ], n_samples, p=[0.30, 0.25, 0.20, 0.15, 0.10])
              
              # Calculate affordability ratios
              debt_to_income = existing_debt / monthly_income
              purchase_to_income = purchase_amount / monthly_income
              
              # Determine optimal payment plan (ground truth)
              optimal_plan = []
              for i in range(n_samples):
                  if purchase_to_income[i] < 0.1 and credit_score[i] > 700:
                      optimal_plan.append('Pay in Full')
                  elif purchase_to_income[i] < 0.3 and debt_to_income[i] < 0.3:
                      optimal_plan.append('Pay in 4')
                  elif purchase_to_income[i] < 0.5 and credit_score[i] > 600:
                      optimal_plan.append('Pay in 30')
                  else:
                      optimal_plan.append('Pay Over Time')
              
              return pd.DataFrame({
                  'gender': gender,
                  'age': age,
                  'region': region,
                  'monthly_income': monthly_income,
                  'credit_score': credit_score,
                  'existing_debt': existing_debt,
                  'purchase_amount': purchase_amount,
                  'product_category': product_category,
                  'debt_to_income': debt_to_income,
                  'purchase_to_income': purchase_to_income,
                  'optimal_plan': optimal_plan
              })

          def test_payment_plan_fairness(data):
              """Test fairness in payment plan recommendations"""
              results = {}
              
              # Test by gender
              gender_distribution = data.groupby(['gender', 'optimal_plan']).size().unstack(fill_value=0)
              gender_percentages = gender_distribution.div(gender_distribution.sum(axis=1), axis=0)
              
              results['gender_fairness'] = {
                  'distribution': gender_percentages.to_dict(),
                  'max_difference': {}
              }
              
              for plan in gender_percentages.columns:
                  max_diff = gender_percentages[plan].max() - gender_percentages[plan].min()
                  results['gender_fairness']['max_difference'][plan] = max_diff
              
              # Test by region
              region_distribution = data.groupby(['region', 'optimal_plan']).size().unstack(fill_value=0)
              region_percentages = region_distribution.div(region_distribution.sum(axis=1), axis=0)
              
              results['regional_fairness'] = {
                  'distribution': region_percentages.to_dict(),
                  'max_difference': {}
              }
              
              for plan in region_percentages.columns:
                  max_diff = region_percentages[plan].max() - region_percentages[plan].min()
                  results['regional_fairness']['max_difference'][plan] = max_diff
              
              # Test by age groups
              data['age_group'] = pd.cut(data['age'], bins=[18, 25, 35, 50, 65], 
                                       labels=['18-25', '26-35', '36-50', '51-65'])
              age_distribution = data.groupby(['age_group', 'optimal_plan']).size().unstack(fill_value=0)
              age_percentages = age_distribution.div(age_distribution.sum(axis=1), axis=0)
              
              results['age_fairness'] = {
                  'distribution': age_percentages.to_dict(),
                  'max_difference': {}
              }
              
              for plan in age_percentages.columns:
                  max_diff = age_percentages[plan].max() - age_percentages[plan].min()
                  results['age_fairness']['max_difference'][plan] = max_diff
              
              return results

          def main():
              print("💳 Generating payment plan recommendation test data...")
              data = generate_payment_plan_data(5000)
              
              print(f"📊 Dataset shape: {data.shape}")
              print("\n📈 Payment plan distribution:")
              plan_counts = data['optimal_plan'].value_counts()
              for plan, count in plan_counts.items():
                  print(f"  {plan}: {count} ({count/len(data):.1%})")
              
              print("\n⚖️ Testing payment plan fairness...")
              fairness_results = test_payment_plan_fairness(data)
              
              print("\n👥 GENDER FAIRNESS TEST")
              gender_max_diffs = fairness_results['gender_fairness']['max_difference']
              for plan, diff in gender_max_diffs.items():
                  status = "✅ PASS" if diff < 0.1 else "❌ FAIL"
                  print(f"  {plan}: Max difference = {diff:.3f} {status}")
              
              print("\n🌍 REGIONAL FAIRNESS TEST")
              regional_max_diffs = fairness_results['regional_fairness']['max_difference']
              for plan, diff in regional_max_diffs.items():
                  status = "✅ PASS" if diff < 0.15 else "❌ FAIL"  # Higher threshold for regions
                  print(f"  {plan}: Max difference = {diff:.3f} {status}")
              
              print("\n📅 AGE FAIRNESS TEST")
              age_max_diffs = fairness_results['age_fairness']['max_difference']
              for plan, diff in age_max_diffs.items():
                  status = "✅ PASS" if diff < 0.2 else "❌ FAIL"  # Reasonable age-based differences
                  print(f"  {plan}: Max difference = {diff:.3f} {status}")
              
              # Calculate overall fairness score
              all_diffs = list(gender_max_diffs.values()) + list(regional_max_diffs.values())
              avg_unfairness = np.mean(all_diffs)
              fairness_score = max(0, 1 - avg_unfairness * 5)  # Scale to 0-1
              
              print(f"\n📊 OVERALL FAIRNESS SCORE: {fairness_score:.3f}")
              print(f"✅ Fairness Status: {'PASS' if fairness_score > 0.8 else 'NEEDS IMPROVEMENT'}")
              
              # Save results
              final_results = {
                  'timestamp': pd.Timestamp.now().isoformat(),
                  'dataset_size': len(data),
                  'fairness_score': fairness_score,
                  'fairness_results': fairness_results,
                  'payment_plan_distribution': plan_counts.to_dict(),
                  'tests_passed': {
                      'gender_fairness': all(diff < 0.1 for diff in gender_max_diffs.values()),
                      'regional_fairness': all(diff < 0.15 for diff in regional_max_diffs.values()),
                      'age_fairness': all(diff < 0.2 for diff in age_max_diffs.values()),
                      'overall_fairness': fairness_score > 0.8
                  }
              }
              
              with open('payment_plan_bias_results.json', 'w') as f:
                  json.dump(final_results, f, indent=2, default=str)
              
              print(f"\n📁 Results saved to payment_plan_bias_results.json")
              return final_results

          if __name__ == "__main__":
              main()
          EOF

          cd bias-testing
          python payment_plan_bias_test.py

      - name: 🔍 Model Explainability Testing
        run: |
          cat > bias-testing/model_explainability_test.py << 'EOF'
          import numpy as np
          import pandas as pd
          import json
          from sklearn.ensemble import RandomForestClassifier
          from sklearn.model_selection import train_test_split

          def create_explainable_model_test():
              """Test model explainability and interpretability"""
              
              # Generate simple test data
              np.random.seed(42)
              n_samples = 1000
              
              # Features that should influence credit decisions
              income = np.random.lognormal(9, 0.5, n_samples)
              payment_history = np.random.beta(2, 1, n_samples) * 100
              debt_ratio = np.random.beta(2, 3, n_samples)
              employment_length = np.random.exponential(3, n_samples)
              
              # Protected attributes (should not influence decisions)
              gender = np.random.choice([0, 1], n_samples)  # 0=Female, 1=Male
              region = np.random.choice([0, 1, 2], n_samples)  # 0=Urban, 1=Semi-Urban, 2=Rural
              
              # Create target based only on legitimate factors
              credit_score = (
                  np.log(income) * 0.3 +
                  payment_history * 0.004 +
                  (1 - debt_ratio) * 0.3 +
                  np.minimum(employment_length, 10) * 0.05
              )
              
              credit_approved = (credit_score + np.random.normal(0, 0.1, n_samples)) > 2.5
              
              # Create feature matrix
              X = pd.DataFrame({
                  'income': income,
                  'payment_history': payment_history,
                  'debt_ratio': debt_ratio,
                  'employment_length': employment_length,
                  'gender': gender,
                  'region': region
              })
              
              y = credit_approved.astype(int)
              
              return X, y

          def test_feature_importance_bias(X, y):
              """Test if protected attributes have high feature importance"""
              
              # Train model
              X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.3, random_state=42)
              model = RandomForestClassifier(n_estimators=100, random_state=42)
              model.fit(X_train, y_train)
              
              # Get feature importances
              feature_importance = pd.DataFrame({
                  'feature': X.columns,
                  'importance': model.feature_importances_
              }).sort_values('importance', ascending=False)
              
              print("📊 Feature Importance Analysis:")
              for _, row in feature_importance.iterrows():
                  print(f"  {row['feature']}: {row['importance']:.4f}")
              
              # Check if protected attributes have low importance
              protected_features = ['gender', 'region']
              protected_importance = feature_importance[
                  feature_importance['feature'].isin(protected_features)
              ]['importance'].sum()
              
              legitimate_features = ['income', 'payment_history', 'debt_ratio', 'employment_length']
              legitimate_importance = feature_importance[
                  feature_importance['feature'].isin(legitimate_features)
              ]['importance'].sum()
              
              bias_ratio = protected_importance / legitimate_importance
              
              print(f"\n⚖️ Bias Analysis:")
              print(f"  Protected attributes importance: {protected_importance:.4f}")
              print(f"  Legitimate features importance: {legitimate_importance:.4f}")
              print(f"  Bias ratio: {bias_ratio:.4f}")
              
              bias_test_passed = bias_ratio < 0.2  # Protected features should be <20% of legitimate
              print(f"  ✅ Bias test: {'PASS' if bias_test_passed else 'FAIL'}")
              
              return {
                  'feature_importance': feature_importance.to_dict('records'),
                  'protected_importance': protected_importance,
                  'legitimate_importance': legitimate_importance,
                  'bias_ratio': bias_ratio,
                  'bias_test_passed': bias_test_passed
              }

          def test_prediction_consistency(X, y):
              """Test if similar profiles get consistent predictions regardless of protected attributes"""
              
              # Train model
              model = RandomForestClassifier(n_estimators=100, random_state=42)
              model.fit(X, y)
              
              # Create test cases with same legitimate features but different protected attributes
              test_profile = {
                  'income': 25000,
                  'payment_history': 85,
                  'debt_ratio': 0.3,
                  'employment_length': 5
              }
              
              consistency_tests = []
              
              # Test gender consistency
              for gender in [0, 1]:
                  for region in [0, 1, 2]:
                      profile = test_profile.copy()
                      profile['gender'] = gender
                      profile['region'] = region
                      
                      prediction = model.predict_proba([list(profile.values())])[0][1]  # Probability of approval
                      consistency_tests.append({
                          'gender': gender,
                          'region': region,
                          'approval_probability': prediction
                      })
              
              # Calculate consistency metrics
              predictions = [test['approval_probability'] for test in consistency_tests]
              prediction_std = np.std(predictions)
              prediction_range = max(predictions) - min(predictions)
              
              print(f"\n🔄 Prediction Consistency Analysis:")
              print(f"  Standard deviation: {prediction_std:.4f}")
              print(f"  Prediction range: {prediction_range:.4f}")
              
              consistency_test_passed = prediction_range < 0.1  # Less than 10% variation
              print(f"  ✅ Consistency test: {'PASS' if consistency_test_passed else 'FAIL'}")
              
              return {
                  'consistency_tests': consistency_tests,
                  'prediction_std': prediction_std,
                  'prediction_range': prediction_range,
                  'consistency_test_passed': consistency_test_passed
              }

          def main():
              print("🔍 Testing model explainability and bias detection...")
              
              # Generate test data
              X, y = create_explainable_model_test()
              
              print(f"📊 Dataset shape: {X.shape}")
              print(f"📈 Approval rate: {y.mean():.2%}")
              
              # Test feature importance
              importance_results = test_feature_importance_bias(X, y)
              
              # Test prediction consistency
              consistency_results = test_prediction_consistency(X, y)
              
              # Combine results
              final_results = {
                  'timestamp': pd.Timestamp.now().isoformat(),
                  'dataset_size': len(X),
                  'approval_rate': float(y.mean()),
                  'importance_analysis': importance_results,
                  'consistency_analysis': consistency_results,
                  'overall_tests_passed': {
                      'feature_importance_bias': importance_results['bias_test_passed'],
                      'prediction_consistency': consistency_results['consistency_test_passed']
                  }
              }
              
              all_tests_passed = all(final_results['overall_tests_passed'].values())
              print(f"\n🎯 OVERALL EXPLAINABILITY TEST: {'✅ PASS' if all_tests_passed else '❌ FAIL'}")
              
              with open('model_explainability_results.json', 'w') as f:
                  json.dump(final_results, f, indent=2, default=str)
              
              print(f"📁 Results saved to model_explainability_results.json")
              return final_results

          if __name__ == "__main__":
              main()
          EOF

