name: 📊 SonarQube Code Quality Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.14.0"

permissions:
  contents: read
  security-events: write

jobs:
  sonarqube-analysis:
    name: 📊 SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 📚 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Generate Prisma Client
        run: pnpm prisma generate --schema=./backend/services/auth-service/prisma/schema.prisma

      - name: 🧪 Run Tests with Coverage
        run: pnpm run test:coverage
        env:
          CI: true

      - name: 📊 SonarQube Scan
        uses: sonarqube-quality-gate-action@master
        with:
          scanMetadataReportFile: coverage/sonar-report.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: 📈 Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-coverage-reports
          path: |
            coverage/
            sonar-report.json
          retention-days: 30

  code-quality-gate:
    name: 🎯 Quality Gate
    runs-on: ubuntu-latest
    needs: sonarqube-analysis
    if: always()

    steps:
      - name: 🎯 Check Quality Gate
        run: |
          echo "📊 SonarQube Quality Gate Results"
          echo "Status: ${{ needs.sonarqube-analysis.result }}"

          if [ "${{ needs.sonarqube-analysis.result }}" != "success" ]; then
            echo "❌ Quality gate failed!"
            exit 1
          else
            echo "✅ Quality gate passed!"
          fi
