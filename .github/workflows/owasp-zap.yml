name: 🔒 OWASP ZAP Security Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans every night at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.14.0"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  owasp-zap-scan:
    name: 🔒 OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 📚 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Applications
        run: |
          pnpm run build
          pnpm run --filter=backend/services/auth-service build

      - name: 🚀 Start Test Services
        run: |
          # Start auth-service for testing
          cd backend/services/auth-service
          npm start &
          sleep 30

          # Verify service is running
          curl -f http://localhost:3000/health || exit 1
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"

      - name: 🔒 Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:3000"
          rules_file_name: ".github/workflows/zap-rules.txt"
          cmd_options: "-a -x owasp-zap-report.xml -r owasp-zap-report.html"

      - name: 🔍 Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://localhost:3000"
          rules_file_name: ".github/workflows/zap-rules.txt"
          cmd_options: "-a -x owasp-zap-full-report.xml -r owasp-zap-full-report.html"

      - name: 🔐 Run API Security Testing
        run: |
          # Test API endpoints for security vulnerabilities
          echo "Testing critical API endpoints..."

          # Test authentication endpoints
          curl -X POST http://localhost:3000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com","password":"test"}' || true
            
          # Test payment endpoints (should require auth)
          curl -X GET http://localhost:3000/payments || true

          # Test KYC endpoints (should require auth)
          curl -X GET http://localhost:3000/kyc/verify || true

      - name: 🔍 Advanced Security Testing
        run: |
          # SQL Injection Testing
          echo "Running SQL injection tests..."
          curl -X GET "http://localhost:3000/users?id=1' OR '1'='1" || true

          # XSS Testing
          echo "Running XSS tests..."
          curl -X POST http://localhost:3000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"<script>alert(1)</script>","password":"test"}' || true

          # CSRF Testing
          echo "Running CSRF tests..."
          curl -X POST http://localhost:3000/payments/create \
            -H "Content-Type: application/json" \
            -d '{"amount":1000}' || true

      - name: 🏦 NBE Compliance Security Tests
        run: |
          echo "Testing NBE compliance security requirements..."

          # Test data encryption endpoints
          curl -X GET http://localhost:3000/health/encryption || true

          # Test audit logging
          curl -X GET http://localhost:3000/health/audit || true

          # Test Fayda ID integration security
          curl -X POST http://localhost:3000/kyc/fayda-verify \
            -H "Content-Type: application/json" \
            -d '{"nationalId":"test","biometric":"test"}' || true

      - name: 📊 Generate Security Report
        run: |
          echo "# OWASP ZAP Security Scan Results" > security-report.md
          echo "" >> security-report.md
          echo "## Scan Summary" >> security-report.md
          echo "- **Target**: http://localhost:3000" >> security-report.md
          echo "- **Scan Date**: $(date)" >> security-report.md
          echo "- **Scan Type**: Baseline + Full Scan" >> security-report.md
          echo "" >> security-report.md

          if [ -f owasp-zap-report.xml ]; then
            echo "## Baseline Scan Results" >> security-report.md
            echo "See attached XML report for details." >> security-report.md
          fi

          if [ -f owasp-zap-full-report.xml ]; then
            echo "## Full Scan Results" >> security-report.md
            echo "See attached XML report for details." >> security-report.md
          fi

      - name: 📁 Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-zap-security-reports
          path: |
            owasp-zap-report.xml
            owasp-zap-report.html
            owasp-zap-full-report.xml
            owasp-zap-full-report.html
            security-report.md
          retention-days: 90
          if-no-files-found: warn

      - name: 📤 Upload SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: owasp-zap-report.xml
          category: owasp-zap

      - name: 🚨 Security Alert on Failures
        if: failure()
        run: |
          echo "🚨 SECURITY ALERT: OWASP ZAP scan detected vulnerabilities!"
          echo "Please review the security reports and address critical findings."
          exit 1
