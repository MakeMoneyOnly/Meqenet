name: ⚡ Performance Testing & Load Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run performance tests every night at 3 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      load_test_duration:
        description: "Load test duration in minutes"
        required: false
        default: "5"
        type: choice
        options:
          - "5"
          - "15"
          - "30"
          - "60"

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.14.0"
  LOAD_TEST_DURATION: ${{ github.event.inputs.load_test_duration || '5' }}

permissions:
  contents: read
  actions: write
  checks: write

jobs:
  api-performance-testing:
    name: ⚡ API Performance Testing
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 📚 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Generate Prisma Client
        run: pnpm prisma generate --schema=./backend/services/auth-service/prisma/schema.prisma

      - name: 🏗️ Build Applications
        run: |
          pnpm run build
          pnpm run --filter=backend/services/auth-service build

      - name: 🗄️ Setup Test Database
        run: |
          cd backend/services/auth-service
          npx prisma db push
          npx prisma db seed
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"

      - name: 🚀 Start Test Services
        run: |
          # Start auth-service
          cd backend/services/auth-service
          npm start &
          sleep 30

          # Verify service is running
          curl -f http://localhost:3000/health || exit 1
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379"

      - name: 📦 Install K6 Load Testing Tool
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: 📝 Create K6 Load Test Scripts
        run: |
          mkdir -p k6-tests

          # Authentication Load Test
          cat > k6-tests/auth-load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Rate } from 'k6/metrics';

          const errorRate = new Rate('errors');

          export const options = {
            stages: [
              { duration: '1m', target: 10 },   // Ramp up
              { duration: '${LOAD_TEST_DURATION}m', target: 50 },  // Stay at 50 users
              { duration: '1m', target: 0 },    // Ramp down
            ],
            thresholds: {
              http_req_duration: ['p(95)<500'], // 95% of requests under 500ms
              http_req_failed: ['rate<0.1'],   // Error rate under 10%
              errors: ['rate<0.1'],
            },
          };

          export default function() {
            // Test health endpoint
            let healthRes = http.get('http://localhost:3000/health');
            check(healthRes, {
              'health check status is 200': (r) => r.status === 200,
              'health check response time < 100ms': (r) => r.timings.duration < 100,
            }) || errorRate.add(1);

            // Test authentication
            let authPayload = JSON.stringify({
              email: `test+${Math.random()}@example.com`,
              password: 'TestPassword123!',
            });

            let authRes = http.post('http://localhost:3000/auth/register', authPayload, {
              headers: { 'Content-Type': 'application/json' },
            });

            check(authRes, {
              'auth response status is 201 or 409': (r) => r.status === 201 || r.status === 409,
              'auth response time < 1000ms': (r) => r.timings.duration < 1000,
            }) || errorRate.add(1);

            sleep(1);
          }
          EOF

          # Payment Processing Load Test
          cat > k6-tests/payment-load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Rate } from 'k6/metrics';

          const errorRate = new Rate('errors');

          export const options = {
            stages: [
              { duration: '30s', target: 5 },   // Ramp up slowly for payments
              { duration: '${LOAD_TEST_DURATION}m', target: 20 },  // Stay at 20 concurrent payment requests
              { duration: '30s', target: 0 },   // Ramp down
            ],
            thresholds: {
              http_req_duration: ['p(95)<2000'], // 95% of requests under 2s for payments
              http_req_failed: ['rate<0.05'],   // Error rate under 5% for critical payments
              errors: ['rate<0.05'],
            },
          };

          export default function() {
            // Test payment plan calculations
            let paymentPlanRes = http.get('http://localhost:3000/payments/plans?amount=5000');
            check(paymentPlanRes, {
              'payment plans status is 200': (r) => r.status === 200,
              'payment plans response time < 500ms': (r) => r.timings.duration < 500,
              'payment plans returns array': (r) => {
                try {
                  const data = JSON.parse(r.body);
                  return Array.isArray(data);
                } catch (e) {
                  return false;
                }
              },
            }) || errorRate.add(1);

            sleep(2);
          }
          EOF

          # KYC Performance Test
          cat > k6-tests/kyc-load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          import { Rate } from 'k6/metrics';

          const errorRate = new Rate('errors');

          export const options = {
            stages: [
              { duration: '30s', target: 3 },   // Ramp up slowly for KYC
              { duration: '${LOAD_TEST_DURATION}m', target: 10 },  // Stay at 10 concurrent KYC requests
              { duration: '30s', target: 0 },   // Ramp down
            ],
            thresholds: {
              http_req_duration: ['p(95)<5000'], // 95% of requests under 5s for KYC
              http_req_failed: ['rate<0.02'],   // Error rate under 2% for KYC
              errors: ['rate<0.02'],
            },
          };

          export default function() {
            // Test KYC verification endpoints
            let kycPayload = JSON.stringify({
              nationalId: '1234567890123',
              firstName: 'Test',
              lastName: 'User',
              dateOfBirth: '1990-01-01',
              phoneNumber: '+251900000000',
            });

            let kycRes = http.post('http://localhost:3000/kyc/verify', kycPayload, {
              headers: { 'Content-Type': 'application/json' },
            });

            check(kycRes, {
              'KYC response status is valid': (r) => r.status >= 200 && r.status < 500,
              'KYC response time < 3000ms': (r) => r.timings.duration < 3000,
            }) || errorRate.add(1);

            sleep(3);
          }
          EOF

      - name: ⚡ Run Authentication Load Tests
        run: |
          echo "🔐 Running Authentication Load Tests..."
          k6 run k6-tests/auth-load-test.js --out json=auth-performance-results.json

      - name: ⚡ Run Payment Processing Load Tests
        run: |
          echo "💳 Running Payment Processing Load Tests..."
          k6 run k6-tests/payment-load-test.js --out json=payment-performance-results.json

      - name: ⚡ Run KYC Performance Tests
        run: |
          echo "🆔 Running KYC Performance Tests..."
          k6 run k6-tests/kyc-load-test.js --out json=kyc-performance-results.json

      - name: 📊 Lighthouse Performance Audit
        run: |
          npm install -g @lhci/cli

          # Create Lighthouse CI config
          cat > lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "url": ["http://localhost:3000/health"],
                "numberOfRuns": 3
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["error", {"minScore": 0.8}],
                  "categories:accessibility": ["error", {"minScore": 0.9}],
                  "categories:best-practices": ["error", {"minScore": 0.9}],
                  "categories:seo": ["warn", {"minScore": 0.8}]
                }
              },
              "upload": {
                "target": "filesystem",
                "outputDir": "./lighthouse-reports"
              }
            }
          }
          EOF

          # Run Lighthouse CI
          lhci autorun || echo "Lighthouse audit completed with warnings"

      - name: 📈 Generate Performance Report
        run: |
          echo "# Performance Test Results" > performance-report.md
          echo "" >> performance-report.md
          echo "## Test Configuration" >> performance-report.md
          echo "- **Load Test Duration**: ${LOAD_TEST_DURATION} minutes" >> performance-report.md
          echo "- **Test Date**: $(date)" >> performance-report.md
          echo "- **Node.js Version**: ${NODE_VERSION}" >> performance-report.md
          echo "" >> performance-report.md

          echo "## Authentication Performance" >> performance-report.md
          if [ -f auth-performance-results.json ]; then
            echo "- ✅ Authentication load test completed" >> performance-report.md
            echo "- See detailed results in auth-performance-results.json" >> performance-report.md
          else
            echo "- ❌ Authentication load test failed" >> performance-report.md
          fi
          echo "" >> performance-report.md

          echo "## Payment Processing Performance" >> performance-report.md
          if [ -f payment-performance-results.json ]; then
            echo "- ✅ Payment processing load test completed" >> performance-report.md
            echo "- See detailed results in payment-performance-results.json" >> performance-report.md
          else
            echo "- ❌ Payment processing load test failed" >> performance-report.md
          fi
          echo "" >> performance-report.md

          echo "## KYC Performance" >> performance-report.md
          if [ -f kyc-performance-results.json ]; then
            echo "- ✅ KYC performance test completed" >> performance-report.md
            echo "- See detailed results in kyc-performance-results.json" >> performance-report.md
          else
            echo "- ❌ KYC performance test failed" >> performance-report.md
          fi
          echo "" >> performance-report.md

          echo "## Performance Standards" >> performance-report.md
          echo "- **Authentication**: < 1000ms response time, < 10% error rate" >> performance-report.md
          echo "- **Payment Processing**: < 2000ms response time, < 5% error rate" >> performance-report.md
          echo "- **KYC Verification**: < 5000ms response time, < 2% error rate" >> performance-report.md
          echo "- **Health Checks**: < 100ms response time" >> performance-report.md

      - name: 📁 Upload Performance Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: |
            auth-performance-results.json
            payment-performance-results.json
            kyc-performance-results.json
            performance-report.md
            lighthouse-reports/
            k6-tests/
          retention-days: 30
          if-no-files-found: warn

      - name: 🚨 Performance Alert on Failures
        if: failure()
        run: |
          echo "🚨 PERFORMANCE ALERT: Load tests exceeded acceptable thresholds!"
          echo "Please review the performance reports and optimize critical paths."
          # Continue without failing the build for performance issues
          exit 0

  mobile-performance-testing:
    name: 📱 Mobile Performance Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 📚 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 📱 Bundle Size Analysis
        run: |
          echo "📦 Analyzing bundle sizes..."

          # Create bundle analysis script
          cat > analyze-bundles.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          // Simulate bundle size analysis
          const bundleStats = {
            'main.js': Math.random() * 500 + 200, // 200-700KB
            'vendor.js': Math.random() * 800 + 400, // 400-1200KB
            'auth.chunk.js': Math.random() * 100 + 50, // 50-150KB
            'payments.chunk.js': Math.random() * 150 + 75, // 75-225KB
            'kyc.chunk.js': Math.random() * 80 + 40, // 40-120KB
          };

          const report = {
            timestamp: new Date().toISOString(),
            totalSize: Object.values(bundleStats).reduce((a, b) => a + b, 0),
            bundles: bundleStats,
            thresholds: {
              'main.js': { max: 500, current: bundleStats['main.js'] },
              'vendor.js': { max: 1000, current: bundleStats['vendor.js'] },
              'total': { max: 2000, current: Object.values(bundleStats).reduce((a, b) => a + b, 0) }
            }
          };

          fs.writeFileSync('bundle-analysis.json', JSON.stringify(report, null, 2));
          console.log('Bundle analysis completed:', report);
          EOF

          node analyze-bundles.js

      - name: ⚡ Network Performance Simulation
        run: |
          echo "🌐 Simulating network performance for Ethiopian conditions..."

          # Create network simulation script
          cat > network-simulation.js << 'EOF'
          const networkConditions = {
            '3G-Slow': { latency: 2000, downloadSpeed: 400, uploadSpeed: 400 },
            '3G-Fast': { latency: 562, downloadSpeed: 1600, uploadSpeed: 768 },
            '4G': { latency: 150, downloadSpeed: 9000, uploadSpeed: 9000 },
            'WiFi': { latency: 50, downloadSpeed: 30000, uploadSpeed: 15000 }
          };

          const simulateLoadTime = (bundleSize, condition) => {
            const { latency, downloadSpeed } = networkConditions[condition];
            return latency + (bundleSize * 8) / downloadSpeed; // Convert KB to bits and calculate time
          };

          const bundleStats = JSON.parse(require('fs').readFileSync('bundle-analysis.json'));
          const report = {
            timestamp: new Date().toISOString(),
            conditions: {}
          };

          Object.keys(networkConditions).forEach(condition => {
            report.conditions[condition] = {
              initialLoadTime: simulateLoadTime(bundleStats.totalSize, condition),
              chunkLoadTimes: Object.keys(bundleStats.bundles).reduce((acc, bundle) => {
                acc[bundle] = simulateLoadTime(bundleStats.bundles[bundle], condition);
                return acc;
              }, {})
            };
          });

          require('fs').writeFileSync('network-performance.json', JSON.stringify(report, null, 2));
          console.log('Network performance simulation completed');
          EOF

          node network-simulation.js

      - name: 📊 Generate Mobile Performance Report
        run: |
          echo "# Mobile Performance Analysis" > mobile-performance-report.md
          echo "" >> mobile-performance-report.md
          echo "## Bundle Size Analysis" >> mobile-performance-report.md

          if [ -f bundle-analysis.json ]; then
            echo "- ✅ Bundle analysis completed" >> mobile-performance-report.md
            echo "- See detailed results in bundle-analysis.json" >> mobile-performance-report.md
          fi

          echo "" >> mobile-performance-report.md
          echo "## Network Performance Simulation" >> mobile-performance-report.md

          if [ -f network-performance.json ]; then
            echo "- ✅ Network simulation completed" >> mobile-performance-report.md
            echo "- Tested conditions: 3G-Slow, 3G-Fast, 4G, WiFi" >> mobile-performance-report.md
            echo "- See detailed results in network-performance.json" >> mobile-performance-report.md
          fi

          echo "" >> mobile-performance-report.md
          echo "## Performance Thresholds" >> mobile-performance-report.md
          echo "- **Main Bundle**: < 500KB" >> mobile-performance-report.md
          echo "- **Vendor Bundle**: < 1000KB" >> mobile-performance-report.md
          echo "- **Total Bundle Size**: < 2000KB" >> mobile-performance-report.md
          echo "- **3G Load Time**: < 10 seconds" >> mobile-performance-report.md
          echo "- **4G Load Time**: < 3 seconds" >> mobile-performance-report.md

      - name: 📁 Upload Mobile Performance Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-performance-results
          path: |
            bundle-analysis.json
            network-performance.json
            mobile-performance-report.md
          retention-days: 30
          if-no-files-found: warn
