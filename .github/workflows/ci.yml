name: CI - Local Validator Parity

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps for governance/tools
        run: |
          python -m pip install --upgrade pip
          if [ -f tools/git/requirements.txt ]; then pip install -r tools/git/requirements.txt; fi
          if [ -f governance/requirements.txt ]; then pip install -r governance/requirements.txt; fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run local validator (CI mode, PR checks)
        env:
          CI: "1"
          # Optional AWS context; vault smoke test will SKIP if not present
          AWS_REGION: us-east-1
        run: |
          python governance/local_ci_validator.py --ci --categories database-setup code_quality security database testing compliance

      - name: Upload validator report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-ci-validator-report
          path: governance/logs/local_ci_validation_report.json
          if-no-files-found: warn
